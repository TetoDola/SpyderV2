{% load static %}
<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spyder — Graph CRM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
          },
        },
      },
    };
  </script>
  <script src="https://unpkg.com/d3@7"></script>
  <script src="https://unpkg.com/force-graph"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <link rel="stylesheet" href="{% static 'css/graph.css' %}">
</head>
<body class="bg-[#191919] text-white font-sans h-full w-full overflow-hidden">

  <!-- View Toggle Pill -->
  <div id="view-toggle"
    class="fixed top-6 left-1/2 -translate-x-1/2 z-50 bg-gray-800/80 backdrop-blur-md
           rounded-full p-1 flex gap-0.5 shadow-lg shadow-black/40">
    <button id="toggle-graph"
      class="view-toggle-btn px-4 py-1.5 text-xs font-medium rounded-full transition-all duration-150
             cursor-pointer border-none outline-none bg-gray-600 text-white">Graph</button>
    <button id="toggle-table"
      class="view-toggle-btn px-4 py-1.5 text-xs font-medium rounded-full transition-all duration-150
             cursor-pointer border-none outline-none bg-transparent text-white/40 hover:text-white/60">Table</button>
  </div>

  <!-- Search bar (top-left) -->
  <div id="search-bar"
    class="fixed top-6 left-6 z-50 flex items-center gap-2">
    <input id="search-input" type="text" placeholder="Search network..."
      class="bg-gray-800/80 backdrop-blur-md text-white text-sm rounded-lg px-4 py-2
             border-none outline-none focus:ring-1 focus:ring-gray-500 w-56
             placeholder-white/25">
    <div class="flex items-center gap-1.5 bg-gray-800/80 backdrop-blur-md rounded-lg px-3 py-2">
      <label for="hop-input" class="text-[11px] text-white/35 font-medium uppercase tracking-wider whitespace-nowrap">Hops</label>
      <input id="hop-input" type="number" value="0" min="0" max="3"
        class="bg-transparent text-white text-sm w-8 text-center border-none outline-none
               [appearance:textfield] [&::-webkit-outer-spin-button]:appearance-none
               [&::-webkit-inner-spin-button]:appearance-none">
    </div>
    <button id="ghost-toggle"
      class="bg-gray-800/80 backdrop-blur-md rounded-lg px-3 py-2
             text-[11px] text-white/35 font-medium uppercase tracking-wider
             cursor-pointer border-none outline-none hover:text-white/60 transition-colors duration-150
             whitespace-nowrap"
      title="Toggle ghost nodes">Ghosts</button>
  </div>

  <!-- Graph canvas -->
  <div id="graph-canvas" class="w-screen h-screen bg-[#191919]"></div>

  <!-- Table bulk-action bar -->
  <div id="bulk-bar"
    class="hidden fixed bottom-8 left-1/2 -translate-x-1/2 z-[200]
           bg-gray-800/95 backdrop-blur-md rounded-xl px-5 py-3
           flex items-center gap-4 shadow-2xl shadow-black/60 border border-white/[0.06]">
    <span id="bulk-count" class="text-sm text-white/60 font-medium min-w-[80px]"></span>
    <button id="bulk-delete-btn"
      class="flex items-center gap-1.5 px-4 py-1.5 bg-red-500/10 text-red-400 text-sm font-medium
             rounded-lg hover:bg-red-500/20 transition-colors duration-150 cursor-pointer border-none outline-none">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0"/>
      </svg>
      Delete Selected
    </button>
    <button id="bulk-cancel-btn"
      class="px-4 py-1.5 text-white/30 text-sm hover:text-white/60 bg-transparent
             rounded-lg transition-colors duration-150 cursor-pointer border-none outline-none">Cancel</button>
  </div>

  <!-- Table view -->
  <div id="table-view" class="hidden w-screen h-screen bg-[#191919] overflow-y-auto pt-20 px-8 pb-8">
    <div class="max-w-5xl mx-auto">
      <table class="w-full">
        <thead>
          <tr class="border-b border-white/[0.06]">
            <th class="w-10 py-3 pl-4 pr-2">
              <input type="checkbox" id="select-all-cb"
                class="w-3.5 h-3.5 rounded border-white/20 bg-transparent accent-white cursor-pointer">
            </th>
            <th class="text-left text-[11px] font-semibold text-white/30 uppercase tracking-widest py-3 px-4">Title</th>
            <th class="text-left text-[11px] font-semibold text-white/30 uppercase tracking-widest py-3 px-4">Type</th>
            <th class="text-left text-[11px] font-semibold text-white/30 uppercase tracking-widest py-3 px-4">Created</th>
            <th class="w-12"></th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
      <div id="table-empty" class="hidden py-16 text-center text-white/20 text-sm">No nodes yet. Click + to create one.</div>
    </div>
  </div>

  <!-- Top-right buttons -->
  <div class="fixed top-6 right-6 z-50 flex items-center gap-2">
    <!-- Import button -->
    <button id="import-btn"
      class="p-2.5 bg-gray-800/80 backdrop-blur-md rounded-lg
             text-white/35 hover:text-white/70 transition-colors duration-150
             cursor-pointer border-none outline-none"
      title="Import Folder">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
        <path d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5m-13.5-9L12 3m0 0 4.5 4.5M12 3v13.5"/>
      </svg>
    </button>

    <!-- Settings gear -->
    <button id="settings-btn"
      class="p-2.5 bg-gray-800/80 backdrop-blur-md rounded-lg
             text-white/35 hover:text-white/70 transition-colors duration-150
             cursor-pointer border-none outline-none"
      title="Settings">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
        <path d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.325.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 0 1 1.37.49l1.296 2.247a1.125 1.125 0 0 1-.26 1.431l-1.003.827c-.293.241-.438.613-.43.992a7.723 7.723 0 0 1 0 .255c-.008.378.137.75.43.991l1.004.827c.424.35.534.955.26 1.43l-1.298 2.247a1.125 1.125 0 0 1-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.47 6.47 0 0 1-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.019-.398-1.11-.94l-.212-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 0 1-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 0 1-1.369-.49l-1.297-2.247a1.125 1.125 0 0 1 .26-1.431l1.004-.827c.292-.24.437-.613.43-.991a6.932 6.932 0 0 1 0-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 0 1-.26-1.43l1.297-2.247a1.125 1.125 0 0 1 1.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.086.22-.128.332-.183.582-.495.644-.869l.214-1.28Z"/>
        <path d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/>
      </svg>
    </button>
  </div>

  <!-- Import toast -->
  <div id="import-toast"
    class="fixed bottom-8 left-8 z-[100] bg-gray-800/90 backdrop-blur-md text-white/70 text-sm
           px-5 py-3 rounded-lg shadow-lg shadow-black/40 hidden transition-opacity duration-300">
    <span id="import-toast-text">Importing...</span>
  </div>

  <!-- FAB -->
  <button id="fab-add"
    class="fixed bottom-8 right-8 w-14 h-14 rounded-full bg-white text-black text-2xl font-light
           flex items-center justify-center z-[100] shadow-lg shadow-white/10
           hover:scale-110 hover:shadow-white/20 transition-all duration-150 cursor-pointer
           leading-none border-none outline-none"
    title="Add Node">+</button>

  <!-- ═══ Center Peek Modal (Detail + Create) ═══ -->
  <div id="peek-backdrop" class="fixed inset-0 bg-[#191919]/80 z-[300] hidden flex items-center justify-center">
    <div id="peek-modal"
      class="bg-[#1e1e1e] rounded-xl shadow-2xl w-full max-w-3xl max-h-[85vh] flex flex-col
             transition-all duration-300 ease-out overflow-hidden mx-4">

      <!-- Top bar -->
      <div class="flex items-center justify-between px-6 py-3 border-b border-white/[0.06] shrink-0">
        <div class="flex items-center gap-3 min-w-0 flex-1">
          <select id="peek-type"
            class="bg-transparent border-none text-[10px] font-semibold uppercase tracking-widest
                   outline-none cursor-pointer px-2.5 py-1 rounded-full
                   hover:bg-white/5 transition-colors duration-150">
            <option value="PERSON" class="bg-[#1e1e1e]">Person</option>
            <option value="COMPANY" class="bg-[#1e1e1e]">Company</option>
            <option value="MEETING" class="bg-[#1e1e1e]">Meeting</option>
          </select>
        </div>
        <div class="flex items-center gap-1">
          <button id="peek-expand" title="Expand"
            class="p-2 text-white/25 hover:text-white/60 hover:bg-white/5 rounded-lg
                   transition-colors duration-150 cursor-pointer bg-transparent border-none outline-none">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path id="expand-icon" d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/>
            </svg>
          </button>
          <button id="peek-close"
            class="p-2 text-white/25 hover:text-white/60 hover:bg-white/5 rounded-lg
                   transition-colors duration-150 cursor-pointer bg-transparent border-none outline-none">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M18 6L6 18M6 6l12 12"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Scrollable body -->
      <div class="flex-1 overflow-y-auto px-10 py-8 space-y-6">

        <!-- Image + Title -->
        <div class="flex items-start gap-5">
          <div id="peek-image-zone"
            class="shrink-0 w-16 h-16 rounded-full bg-white/[0.04] border border-dashed border-white/10
                   flex items-center justify-center cursor-pointer hover:border-white/25
                   transition-colors duration-150 overflow-hidden group relative">
            <img id="peek-image" src="" alt=""
              class="w-full h-full object-cover hidden">
            <span id="peek-image-placeholder" class="text-white/15 text-xl group-hover:text-white/30 transition-colors">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                <path d="M6.827 6.175A2.31 2.31 0 0 1 5.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 0 0 2.25 2.25h15A2.25 2.25 0 0 0 21.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 0 0-1.134-.175 2.31 2.31 0 0 1-1.64-1.055l-.822-1.316a2.192 2.192 0 0 0-1.736-1.039 48.774 48.774 0 0 0-5.232 0 2.192 2.192 0 0 0-1.736 1.039l-.821 1.316Z"/>
                <path d="M16.5 12.75a4.5 4.5 0 1 1-9 0 4.5 4.5 0 0 1 9 0Z"/>
              </svg>
            </span>
            <input type="file" id="peek-image-input" accept="image/*" class="hidden">
          </div>
          <input type="text" id="peek-title"
            class="bg-transparent border-none outline-none focus:ring-0 text-4xl font-bold
                   w-full p-0 text-white placeholder-white/15 caret-white"
            placeholder="Untitled Node">
        </div>

        <!-- Properties -->
        <section>
          <h3 class="text-[11px] font-semibold text-white/30 uppercase tracking-widest mb-3">Properties</h3>
          <div id="properties-grid" class="flex flex-col gap-1.5"></div>
          <button type="button" id="add-property-btn"
            class="mt-2.5 px-3 py-1.5 text-[11px] text-white/25 bg-transparent border border-dashed border-white/10
                   rounded cursor-pointer hover:text-white/50 hover:border-white/20
                   transition-colors duration-150 outline-none">+ Add Property</button>
        </section>

        <!-- Notes -->
        <section class="flex-1 flex flex-col">
          <div class="flex items-center justify-between mb-3">
            <h3 class="text-[11px] font-semibold text-white/30 uppercase tracking-widest">Notes</h3>
            <div class="flex bg-white/[0.04] rounded-lg p-0.5">
              <button type="button" id="notes-tab-edit"
                class="notes-tab px-3 py-1 text-[11px] rounded-md transition-colors duration-150
                       cursor-pointer border-none outline-none font-medium
                       bg-white/10 text-white/70">Edit</button>
              <button type="button" id="notes-tab-preview"
                class="notes-tab px-3 py-1 text-[11px] rounded-md transition-colors duration-150
                       cursor-pointer border-none outline-none font-medium
                       bg-transparent text-white/30 hover:text-white/50">Preview</button>
            </div>
          </div>
          <div class="relative flex-1">
            <textarea id="peek-notes"
              placeholder="Type @ to mention and link entities... Supports **Markdown**"
              class="w-full min-h-[200px] bg-transparent border-none focus:ring-0 p-0
                     resize-none outline-none text-gray-300 text-sm leading-relaxed
                     font-sans placeholder-white/15"></textarea>
            <div id="peek-notes-preview"
              class="hidden w-full min-h-[200px] text-sm leading-relaxed text-gray-300"></div>
            <div id="mention-dropdown"
              class="absolute left-0 z-50 w-64 bg-[#2a2a2a] border border-white/10 rounded-lg shadow-2xl
                     overflow-hidden hidden"></div>
          </div>
        </section>
      </div>

      <!-- Footer -->
      <div class="flex items-center justify-between px-10 py-4 border-t border-white/[0.06] shrink-0">
        <button type="button" id="peek-delete"
          class="text-[13px] text-red-400/60 hover:text-red-400 bg-transparent border-none
                 cursor-pointer transition-colors duration-150 outline-none">Delete Node</button>
        <button type="button" id="peek-save"
          class="px-6 py-2 bg-white text-black rounded-lg text-sm font-semibold
                 hover:bg-white/85 disabled:opacity-40 disabled:cursor-not-allowed
                 transition-opacity duration-150 cursor-pointer border-none outline-none">Save</button>
      </div>
    </div>
  </div>

  <!-- ═══ Settings Modal ═══ -->
  <div id="settings-backdrop" class="fixed inset-0 bg-[#191919]/80 z-[400] hidden flex items-center justify-center">
    <div class="bg-[#1e1e1e] rounded-xl shadow-2xl w-full max-w-2xl max-h-[80vh] flex flex-col overflow-hidden mx-4">

      <!-- Header -->
      <div class="flex items-center justify-between px-6 py-4 border-b border-white/[0.06] shrink-0">
        <h2 class="text-sm font-semibold text-white/70 uppercase tracking-widest">Node Templates</h2>
        <button id="settings-close"
          class="p-2 text-white/25 hover:text-white/60 hover:bg-white/5 rounded-lg
                 transition-colors duration-150 cursor-pointer bg-transparent border-none outline-none">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M18 6L6 18M6 6l12 12"/>
          </svg>
        </button>
      </div>

      <!-- Tabs -->
      <div class="flex gap-0.5 px-6 pt-4 pb-0">
        <button type="button" data-tpl-tab="PERSON"
          class="tpl-tab px-4 py-1.5 text-xs font-medium rounded-t-lg cursor-pointer border-none outline-none
                 bg-white/10 text-blue-400 transition-colors duration-150">Person</button>
        <button type="button" data-tpl-tab="COMPANY"
          class="tpl-tab px-4 py-1.5 text-xs font-medium rounded-t-lg cursor-pointer border-none outline-none
                 bg-transparent text-green-400/50 hover:text-green-400 transition-colors duration-150">Company</button>
        <button type="button" data-tpl-tab="MEETING"
          class="tpl-tab px-4 py-1.5 text-xs font-medium rounded-t-lg cursor-pointer border-none outline-none
                 bg-transparent text-amber-400/50 hover:text-amber-400 transition-colors duration-150">Meeting</button>
      </div>

      <!-- Body -->
      <div class="flex-1 overflow-y-auto px-6 py-5 space-y-5">
        <section>
          <h3 class="text-[11px] font-semibold text-white/30 uppercase tracking-widest mb-2">Custom Default Properties</h3>
          <p class="text-[11px] text-white/20 mb-3">These properties will be added to every new node of this type (in addition to system-locked fields).</p>
          <div id="tpl-props-grid" class="flex flex-col gap-1.5"></div>
          <button type="button" id="tpl-add-prop"
            class="mt-2.5 px-3 py-1.5 text-[11px] text-white/25 bg-transparent border border-dashed border-white/10
                   rounded cursor-pointer hover:text-white/50 hover:border-white/20
                   transition-colors duration-150 outline-none">+ Add Property</button>
        </section>

        <section>
          <h3 class="text-[11px] font-semibold text-white/30 uppercase tracking-widest mb-2">Default Notes (Markdown)</h3>
          <textarea id="tpl-notes"
            placeholder="Default markdown content for new nodes..."
            class="w-full min-h-[120px] bg-white/[0.03] border border-white/[0.06] rounded-lg p-3
                   resize-none outline-none text-gray-300 text-sm leading-relaxed
                   font-sans placeholder-white/15 focus:border-white/15 transition-colors"></textarea>
        </section>
      </div>

      <!-- Footer -->
      <div class="flex justify-end px-6 py-4 border-t border-white/[0.06] shrink-0">
        <button type="button" id="tpl-save"
          class="px-6 py-2 bg-white text-black rounded-lg text-sm font-semibold
                 hover:bg-white/85 disabled:opacity-40 disabled:cursor-not-allowed
                 transition-opacity duration-150 cursor-pointer border-none outline-none">Save Templates</button>
      </div>
    </div>
  </div>

  <script src="{% static 'js/graph.js' %}"></script>
</body>
</html>
