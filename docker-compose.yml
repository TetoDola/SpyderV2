services:
  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: unforgetting
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    command: uv run python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
      - /app/.venv
      - media_data:/app/media
    ports:
      - "8000:8000"
    environment:
      UV_LINK_MODE: copy
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    build: .
    command: uv run celery -A config worker -l info --concurrency=2
    volumes:
      - .:/app
      - /app/.venv
      - media_data:/app/media
    environment:
      UV_LINK_MODE: copy
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # celery-beat:
  #   build: .
  #   command: uv run celery -A config beat -l info
  #   volumes:
  #     - .:/app
  #     - /app/.venv
  #   environment:
  #     UV_LINK_MODE: copy
  #   env_file: .env
  #   depends_on:
  #     db:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #   # Uncomment when periodic tasks are added (CELERY_BEAT_SCHEDULE in settings)

volumes:
  postgres_data:
  media_data:
